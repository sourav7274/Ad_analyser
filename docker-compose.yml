version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      WORKERS: ${WORKERS:-1}
      EXECUTOR_THREADS: ${EXECUTOR_THREADS:-4}
      MODEL_TIMEOUT: ${MODEL_TIMEOUT:-30}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
